name: Build Release AAB

on:
  workflow_dispatch:          # run manually from GitHub Actions tab
  push:
    tags:
      - 'v*'                  # auto-build when you push a tag like v1.1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/bhaktdwaar.keystore

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release AAB
        working-directory: android
        env:
          KEYSTORE_FILE: /tmp/bhaktdwaar.keystore
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
        run: ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.run_number }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Attach AAB to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/bundle/release/app-release.aab
          name: "Bhakt Dwaar ${{ github.ref_name }}"
