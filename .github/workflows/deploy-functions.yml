name: Deploy Firebase Functions

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths: ['functions/**']   # only runs when functions/ changes

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package.json

      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json

      - name: Set Cashfree config
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: |
          npx firebase-tools@latest functions:config:set \
            cashfree.app_id="${{ secrets.CF_APP_ID }}" \
            cashfree.secret="${{ secrets.CF_SECRET }}" \
            cashfree.webhook_secret="${{ secrets.CF_WEBHOOK_SECRET }}" \
            --project bhakt-dwaar-89532 --non-interactive

      - name: Deploy Firebase Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: |
          npx firebase-tools@latest deploy --only functions \
            --project bhakt-dwaar-89532 --non-interactive
